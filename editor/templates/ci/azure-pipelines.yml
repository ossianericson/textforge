trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self
  - task: NodeTool@0
    inputs:
      versionSpec: '22.x'
  - script: npm ci
    displayName: Install dependencies
  - script: npm run spec:validate
    displayName: Validate specs
  - script: npm run spec:compile
    displayName: Compile specs
