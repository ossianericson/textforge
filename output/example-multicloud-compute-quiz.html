      const scoreValue = document.getElementById('scoreValue');
      const totalValue = document.getElementById('totalValue');
      const scoreBar = document.getElementById('scoreBar');
      const modeButtons = document.querySelectorAll('.mode-toggle button');
      const viewButtons = document.querySelectorAll('.view-toggle button');
      const studySection = document.getElementById('studySection');
      const quizSection = document.getElementById('quizSection');
      const cardGrid = document.getElementById('cardGrid');
      const summaryList = document.getElementById('summaryList');
      const quizContainer = document.getElementById('quizContainer');
      const quizNav = document.getElementById('quizNav');
      const questionCounter = document.getElementById('questionCounter');
      const nextQuestionButton = document.getElementById('nextQuestion');
      const endScreen = document.getElementById('endScreen');
      const endTitle = document.getElementById('endTitle');
      const endScore = document.getElementById('endScore');
      const resetQuizButton = document.getElementById('resetQuiz');
      const tryAgainButton = document.getElementById('tryAgain');
      const shuffleButton = document.getElementById('shuffleCards');
      const resetCardsButton = document.getElementById('resetCards');

      let currentMode = 'study';
      let currentView = 'single';
      let currentIndex = 0;
      let cards = [...quizData.studyCards];
      const answers = {};

      totalValue.textContent = String(quizData.quizQuestions.length);

      function setMode(mode) {
        currentMode = mode;
        modeButtons.forEach((button) => {
          button.classList.toggle('active', button.dataset.mode === mode);
        });
        studySection.hidden = mode !== 'study';
        quizSection.hidden = mode !== 'quiz';
      }

      function setView(view) {
        currentView = view;
        viewButtons.forEach((button) => {
          button.classList.toggle('active', button.dataset.view === view);
        });
        renderQuiz();
      }

      function updateScoreUI() {
        const correctCount = Object.values(answers).filter((entry) => entry && entry.correct).length;
        scoreValue.textContent = String(correctCount);
        const total = quizData.quizQuestions.length || 1;
        const percent = Math.round((correctCount / total) * 100);
        scoreBar.style.width = `${percent}%`;
      }

      function renderSummary() {
        summaryList.innerHTML = '';
        quizData.summary.forEach((item) => {
          const li = document.createElement('li');
          li.textContent = item;
          summaryList.appendChild(li);
        });
      }

      function syncCardHeight(wrapper) {
        const inner = wrapper.querySelector('.card-inner');
        const front = wrapper.querySelector('.card-face.front');
        const back = wrapper.querySelector('.card-face.back');
        if (!inner || !front || !back) {
          return;
        }
        const maxHeight = Math.max(front.scrollHeight, back.scrollHeight);
        inner.style.minHeight = `${maxHeight}px`;
      }

      function syncAllCardHeights() {
        document.querySelectorAll('.card').forEach((card) => syncCardHeight(card));
      }

      function renderStudyCards() {
        cardGrid.innerHTML = '';
        const grouped = new Map();
        let hasGroups = false;
        cards.forEach((card) => {
          const tag = card.topicTag || 'All Cards';
          if (card.topicTag) {
            hasGroups = true;
          }
          if (!grouped.has(tag)) {
            grouped.set(tag, []);
          }
          grouped.get(tag).push(card);
        });

        grouped.forEach((groupCards, tag) => {
          if (hasGroups) {
            const heading = document.createElement('h3');
            heading.textContent = tag;
            cardGrid.appendChild(heading);
          }
          groupCards.forEach((card) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'card';
            wrapper.dataset.cardId = card.id;

            const inner = document.createElement('div');
            inner.className = 'card-inner';

            const front = document.createElement('div');
            front.className = 'card-face front';

            const title = document.createElement('div');
            title.className = 'card-title';
            title.textContent = card.title;

            const frontText = document.createElement('div');
            frontText.textContent = card.front;

            front.appendChild(title);
            front.appendChild(frontText);

            if (card.hint) {
              const hint = document.createElement('div');
              hint.className = 'hint';
              hint.textContent = card.hint;

              const hintButton = document.createElement('button');
              hintButton.type = 'button';
              hintButton.className = 'hint-toggle';
              hintButton.textContent = 'Hint';
              hintButton.addEventListener('click', (event) => {
                event.stopPropagation();
                hint.classList.toggle('is-visible');
                requestAnimationFrame(() => syncCardHeight(wrapper));
              });

              front.appendChild(hint);
              front.appendChild(hintButton);
            }

            const back = document.createElement('div');
            back.className = 'card-face back';
            back.textContent = card.back;

            inner.appendChild(front);
            inner.appendChild(back);
            wrapper.appendChild(inner);

            wrapper.addEventListener('click', () => {
              wrapper.classList.toggle('is-flipped');
            });

            cardGrid.appendChild(wrapper);
            requestAnimationFrame(() => syncCardHeight(wrapper));
          });
        });
      }

      function shuffleCards() {
        for (let i = cards.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [cards[i], cards[j]] = [cards[j], cards[i]];
        }
        renderStudyCards();
      }

      function resetCards() {
        document.querySelectorAll('.card').forEach((card) => card.classList.remove('is-flipped'));
      }

      function buildOptions(question, selectedKey, disabled) {
        const container = document.createElement('div');
        container.className = 'options';
        question.options.forEach((option) => {
          const label = document.createElement('label');
          label.className = 'option';
          const input = document.createElement('input');
          input.type = 'radio';
          input.name = `question-${question.id}`;
          input.value = option.key;
          input.disabled = disabled;
          if (selectedKey === option.key) {
            input.checked = true;
          }
          const text = document.createElement('span');
          text.textContent = `${option.key}. ${option.text}`;
          label.appendChild(input);
          label.appendChild(text);
          container.appendChild(label);
        });
        return container;
      }

      function markOptions(card, question, selectedKey) {
        const optionLabels = card.querySelectorAll('.option');
        optionLabels.forEach((label) => {
          const input = label.querySelector('input');
          if (!input) return;
          const key = input.value;
          if (key === question.answer) {
            label.classList.add('is-correct');
          }
          if (selectedKey && key === selectedKey && key !== question.answer) {
            label.classList.add('is-wrong');
          }
        });
      }

      function renderSingleQuestion() {
        quizContainer.innerHTML = '';
        endScreen.classList.remove('is-visible');
        const question = quizData.quizQuestions[currentIndex];
        if (!question) {
          return;
        }

        const card = document.createElement('div');
        card.className = 'quiz-card';
        const prompt = document.createElement('div');
        prompt.className = 'question-text';
        prompt.textContent = question.question;

        const state = answers[question.id];
        const options = buildOptions(question, state?.selected, state?.checked);

        const checkButton = document.createElement('button');
        checkButton.type = 'button';
        checkButton.className = 'action secondary';
        checkButton.textContent = state?.checked ? 'Checked' : 'Check Answer';
        checkButton.disabled = !!state?.checked;

        const feedback = document.createElement('div');
        feedback.className = 'quiz-feedback';

        if (state?.checked) {
          feedback.classList.add('is-visible');
          feedback.innerHTML = `<strong>${state.correct ? '✓ Correct' : '✗ Not quite'}</strong> ${question.explanation}`;
          card.classList.add(state.correct ? 'is-correct' : 'is-wrong');
          markOptions(card, question, state.selected);
        }

        checkButton.addEventListener('click', () => {
          const selected = card.querySelector('input:checked');
          if (!selected) {
            return;
          }
          const selectedKey = selected.value;
          const correct = selectedKey === question.answer;
          answers[question.id] = { selected: selectedKey, correct, checked: true };
          feedback.classList.add('is-visible');
          feedback.innerHTML = `<strong>${correct ? '✓ Correct' : '✗ Not quite'}</strong> ${question.explanation}`;
          card.classList.add(correct ? 'is-correct' : 'is-wrong');
          markOptions(card, question, selectedKey);
          checkButton.textContent = 'Checked';
          checkButton.disabled = true;
          updateScoreUI();
        });

        card.appendChild(prompt);
        card.appendChild(options);
        card.appendChild(checkButton);
        card.appendChild(feedback);
        quizContainer.appendChild(card);
        questionCounter.textContent = `Question ${currentIndex + 1} of ${quizData.quizQuestions.length}`;
        quizNav.style.display = 'flex';
      }

      function renderAllQuestions() {
        quizContainer.innerHTML = '';
        quizNav.style.display = 'none';
        endScreen.classList.remove('is-visible');

        quizData.quizQuestions.forEach((question) => {
          const card = document.createElement('div');
          card.className = 'quiz-card';

          const prompt = document.createElement('div');
          prompt.className = 'question-text';
          prompt.textContent = question.question;

          const state = answers[question.id];
          const options = buildOptions(question, state?.selected, state?.checked);

          const checkButton = document.createElement('button');
          checkButton.type = 'button';
          checkButton.className = 'action secondary';
          checkButton.textContent = state?.checked ? 'Checked' : 'Check Answer';
          checkButton.disabled = !!state?.checked;

          const feedback = document.createElement('div');
          feedback.className = 'quiz-feedback';

          if (state?.checked) {
            feedback.classList.add('is-visible');
            feedback.innerHTML = `<strong>${state.correct ? '✓ Correct' : '✗ Not quite'}</strong> ${question.explanation}`;
            card.classList.add(state.correct ? 'is-correct' : 'is-wrong');
            markOptions(card, question, state.selected);
          }

          checkButton.addEventListener('click', () => {
            const selected = card.querySelector('input:checked');
            if (!selected) {
              return;
            }
            const selectedKey = selected.value;
            const correct = selectedKey === question.answer;
            answers[question.id] = { selected: selectedKey, correct, checked: true };
            feedback.classList.add('is-visible');
            feedback.innerHTML = `<strong>${correct ? '✓ Correct' : '✗ Not quite'}</strong> ${question.explanation}`;
            card.classList.add(correct ? 'is-correct' : 'is-wrong');
            markOptions(card, question, selectedKey);
            checkButton.textContent = 'Checked';
            checkButton.disabled = true;
            updateScoreUI();
            if (quizData.quizQuestions.every((q) => answers[q.id]?.checked)) {
              showEndScreen();
            }
          });

          card.appendChild(prompt);
          card.appendChild(options);
          card.appendChild(checkButton);
          card.appendChild(feedback);
          quizContainer.appendChild(card);
        });
      }

      function renderQuiz() {
        if (currentView === 'single') {
          renderSingleQuestion();
        } else {
          renderAllQuestions();
        }
      }

      function showEndScreen() {
        const correctCount = Object.values(answers).filter((entry) => entry && entry.correct).length;
        const total = quizData.quizQuestions.length || 1;
        const scorePercent = Math.round((correctCount / total) * 100);
        let rating = '🌟';
        let title = 'Great job!';

        if (scorePercent >= 90) {
          rating = '🏆';
          title = 'Quiz Champion!';
        } else if (scorePercent >= 70) {
          rating = '🎉';
          title = 'Nice work!';
        } else if (scorePercent >= 50) {
          rating = '🙂';
          title = 'Keep going!';
        } else {
          rating = '💪';
          title = 'Practice makes perfect!';
        }

        endTitle.textContent = `${rating} ${title}`;
        endScore.textContent = `Final score: ${correctCount} / ${total}`;
        endScreen.classList.add('is-visible');
      }

      function resetQuiz() {
        Object.keys(answers).forEach((key) => {
          delete answers[key];
        });
        currentIndex = 0;
        updateScoreUI();
        renderQuiz();
        endScreen.classList.remove('is-visible');
      }

      nextQuestionButton.addEventListener('click', () => {
        if (currentIndex < quizData.quizQuestions.length - 1) {
          currentIndex += 1;
          renderSingleQuestion();
          return;
        }
        showEndScreen();
      });

      modeButtons.forEach((button) => {
        button.addEventListener('click', () => setMode(button.dataset.mode));
      });

      viewButtons.forEach((button) => {
        button.addEventListener('click', () => setView(button.dataset.view));
      });

      shuffleButton.addEventListener('click', shuffleCards);
      resetCardsButton.addEventListener('click', resetCards);
      resetQuizButton.addEventListener('click', resetQuiz);
      tryAgainButton.addEventListener('click', resetQuiz);
      window.addEventListener('resize', syncAllCardHeights);

      renderSummary();
      renderStudyCards();
      renderQuiz();
      updateScoreUI();
    </script>
  </body>
</html>
